version: '3.3'

services:
  app:
    build: ./app
    image: investment-monitor:defense
    container_name: investment-monitor
    restart: always
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
