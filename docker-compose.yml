version: '3.3'

services:
  app:
    build: ./app
    image: investment-monitor:defense-v14
    container_name: investment-monitor
    restart: always
    ports:
      # 2026-06-23: 暴露 8090 给新闻网页 (supervisord 管的 web_view.py)
      - "127.0.0.1:8090:8090"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
    environment:
      - TZ=Asia/Shanghai
      - PYTHONUNBUFFERED=1
    env_file:
      - .env
